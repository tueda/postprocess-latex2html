[build-system]
build-backend = "setuptools.build_meta"
requires = [
    "setuptools>=61",
]

[project]
name = "postprocess-latex2html"
version = "0.1.0"
description = "Post-process LaTeX2HTML-generated files"
readme = "README.md"
requires-python = ">=3.10"
classifiers = [
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]
dependencies = [
]
scripts.postprocess-latex2html = "run_postprocess_latex2html:main"

[dependency-groups]
dev = [
    "pre-commit>=4.5",
    "pytest>=9",
    "pytest-cov>=7",
    "pytest-xdist>=3.8",
]

[tool.setuptools]
py-modules = [
    "run_postprocess_latex2html",
    "postprocess-latex2html",
]

[tool.ruff]
target-version = "py310"

lint.select = [
    "ALL",
]
lint.ignore = [
    "COM812", # missing-trailing-comma, incompatible with the Ruff formatter
    "D107",   # undocumented-public-init, unnecessary if the class has a docstring
    "D203",   # one-blank-line-before-class, incompatible with D211
    "D213",   # multi-line-summary-second-line, incompatible with D212
]
lint.per-file-ignores."test_*.py" = [
    "S101", # assert, allowed in tests
]

[tool.pyproject-fmt]
column_width = 1
indent = 4

[tool.pytest.ini_options]
addopts = [
    "--cov-report=html",
    "--cov-report=term",
    "--doctest-modules",
]

[tool.mypy]
pretty = true
show_error_codes = true
strict = true
warn_unreachable = true
